name: Build prerendered

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Add SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Add CNAME for custom domain
        run: echo "www.tuurbo-blog.com" > dist/CNAME

      - name: Publish dist/ to prerendered branch
        run: |
          cd dist
          touch .nojekyll
          git init -b prerendered
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Prerendered build from ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" prerendered:prerendered
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
